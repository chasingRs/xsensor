name: Bundle release

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  bundle-linux:
    runs-on: ubuntu-24.04
    env:
      BUNDLE_DIR: target/dx/xsensor/bundle/linux/bundle
      BUNDLE_ARCHIVE: ${{ github.event.repository.name }}-linux.tar.gz
      BUNDLE_ARTIFACT_NAME: ${{ github.event.repository.name }}-linux-bundle
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Cache cargo registries and binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: dioxus-cli-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libxdo-dev \
            libdbus-1-dev \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Dioxus CLI
        run: cargo binstall dioxus-cli --force

      - name: Bundle desktop release
        run: dx bundle --platform desktop --release

      - name: Package bundles
        run: |
          if [ ! -d "$BUNDLE_DIR" ]; then
            echo "Bundle failed: directory $BUNDLE_DIR not created. Check the 'Bundle desktop release' step logs."
            exit 1
          fi
          if ! tar -czf "$BUNDLE_ARCHIVE" -C "$BUNDLE_DIR" --exclude='.*' .; then
            echo "Archiving bundle failed. Verify bundle contents and rerun."
            exit 1
          fi

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUNDLE_ARTIFACT_NAME }}
          path: ${{ env.BUNDLE_ARCHIVE }}

      - name: Attach bundle to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.BUNDLE_ARCHIVE }}

  bundle-windows:
    runs-on: windows-latest
    env:
      BUNDLE_DIR: target/dx/xsensor/bundle/windows/bundle
      BUNDLE_ARCHIVE: ${{ github.event.repository.name }}-windows.zip
      BUNDLE_ARTIFACT_NAME: ${{ github.event.repository.name }}-windows-bundle
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Cache cargo registries and binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: dioxus-cli-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Dioxus CLI
        run: cargo binstall dioxus-cli --force

      - name: Bundle desktop release
        run: dx bundle --platform desktop --release

      - name: Package bundles
        shell: pwsh
        run: |
          if (!(Test-Path -Path $env:BUNDLE_DIR)) {
            Write-Error "Bundle failed: directory $env:BUNDLE_DIR not created."
            exit 1
          }
          Compress-Archive -Path "$env:BUNDLE_DIR\*" -DestinationPath $env:BUNDLE_ARCHIVE

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUNDLE_ARTIFACT_NAME }}
          path: ${{ env.BUNDLE_ARCHIVE }}

      - name: Attach bundle to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.BUNDLE_ARCHIVE }}
