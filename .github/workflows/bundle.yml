name: Bundle release

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  bundle-desktop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf
          sudo apt-get install -y libwebkit2gtk-4.1-dev || sudo apt-get install -y libwebkit2gtk-4.0-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --locked

      - name: Bundle desktop release
        run: dx bundle --platform desktop --release

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: xsensor-desktop-bundle
          path: target/release/bundle

      - name: Attach bundle to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/**/*
