name: Bundle release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  release:
    types: [published]

permissions:
  contents: write

jobs:
  bundle-linux:
    runs-on: ubuntu-24.04
    env:
      BUNDLE_DIR: target/dx/xsensor/bundle/linux/bundle
      BUNDLE_ARCHIVE: ${{ github.event.repository.name }}-linux.tar.gz
      BUNDLE_ARTIFACT_NAME: ${{ github.event.repository.name }}-linux-bundle
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Cache cargo registries and binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: dioxus-cli-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libxdo-dev \
            libdbus-1-dev \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Dioxus CLI
        run: cargo binstall dioxus-cli --force

      - name: Generate Linux Icon
        working-directory: ${{ github.workspace }}
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends imagemagick

          # Generate a square 512x512 PNG for AppImage and verify it exists.
          # ICO files contain multiple images; extract the first one [0] and resize.
          mkdir -p icons
          convert 'icons/icon.ico[0]' -resize 512x512 icons/icon.png
          ls -la icons/
          test -f icons/icon.png

          # Make icon paths absolute to avoid cwd-dependent failures during bundling.
          ICO_PATH="$(realpath icons/icon.ico)"
          PNG_PATH="$(realpath icons/icon.png)"
          sed -i "s|^icon = .*|icon = [\"${ICO_PATH}\", \"${PNG_PATH}\"]|" Dioxus.toml

          echo "Using icons:"; ls -la icons

      - name: Bundle desktop release
        working-directory: ${{ github.workspace }}
        run: dx bundle --platform desktop --release

      - name: Package bundles
        run: |
          echo "Checking BUNDLE_DIR: $BUNDLE_DIR"
          ls -laR "$BUNDLE_DIR" || true
          if [ ! -d "$BUNDLE_DIR" ]; then
            echo "Bundle failed: directory $BUNDLE_DIR not created. Check the 'Bundle desktop release' step logs."
            exit 1
          fi
          
          # Create a staging directory for final artifacts only
          mkdir -p staging
          
          # Copy only the final package files (.deb, .rpm, .AppImage)
          find "$BUNDLE_DIR" -maxdepth 2 -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \) -exec cp {} staging/ \;
          
          echo "Final artifacts:"
          ls -lh staging/
          
          # Package only the final artifacts
          tar -czvf "$BUNDLE_ARCHIVE" -C staging .
          echo "Archive created: $(ls -lh "$BUNDLE_ARCHIVE")"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUNDLE_ARTIFACT_NAME }}
          path: ${{ env.BUNDLE_ARCHIVE }}

      - name: Attach bundle to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.BUNDLE_ARCHIVE }}

  bundle-windows:
    runs-on: windows-latest
    env:
      BUNDLE_DIR: target/dx/xsensor/bundle/windows/bundle
      BUNDLE_ARCHIVE: ${{ github.event.repository.name }}-windows.zip
      BUNDLE_ARTIFACT_NAME: ${{ github.event.repository.name }}-windows-bundle
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Cache cargo registries and binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: dioxus-cli-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Dioxus CLI
        run: cargo binstall dioxus-cli --force

      - name: Bundle desktop release
        run: dx bundle --platform desktop --release

      - name: Package bundles
        shell: pwsh
        run: |
          if (!(Test-Path -Path $env:BUNDLE_DIR)) {
            Write-Error "Bundle failed: directory $env:BUNDLE_DIR not created."
            exit 1
          }
          Compress-Archive -Path "$env:BUNDLE_DIR\*" -DestinationPath $env:BUNDLE_ARCHIVE

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUNDLE_ARTIFACT_NAME }}
          path: ${{ env.BUNDLE_ARCHIVE }}

      - name: Attach bundle to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.BUNDLE_ARCHIVE }}
